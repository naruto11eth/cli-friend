name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: search ranking tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # No deps to install — the tests import src/ directly with the built-in
      # node test runner.
      - name: Run tests
        run: node --test tests/*.test.mjs
